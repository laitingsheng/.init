- name: Install CLI tools
  hosts: all
  gather_facts: false
  tasks:
    - name: Install GitLab CLI
      glab_cli:
        version: "1.102.0"
        os: linux
        arch: amd64
    - name: Install Rancher CLI
      rancher_cli:
        version: "2.14.2"
        os: linux
        arch: amd64
    - name: Install Claude CLI
      claude_cli:
        version: "2.1.170"
        os: linux
        arch: x64
    - name: Install Codex CLI
      codex_cli:
        version: "0.139.0"
        os: linux
        arch: x86_64
    - name: Install Cursor CLI
      cursor_cli:
        version: "2026.06.04-5fd875e"
        os: linux
        arch: x64
    - name: Install uv
      astral_cli:
        tool: uv
        version: "0.11.19"
        arch: x86_64
        platform: unknown
        os: linux
        abi: gnu
    - name: Install ruff
      astral_cli:
        tool: ruff
        version: "0.15.16"
        arch: x86_64
        platform: unknown
        os: linux
        abi: gnu
    - name: Install ty
      astral_cli:
        tool: ty
        version: "0.0.46"
        arch: x86_64
        platform: unknown
        os: linux
        abi: gnu
    - name: Install hadolint
      hadolint:
        version: "2.14.0"
        os: linux
        arch: amd64
    - name: Install prek
      prek_cli:
        version: "0.4.4"
        os: linux
        arch: x86_64
    - name: Install Helm push plugin
      helm_push_plugin:
        version: "0.11.1"
        os: linux
        arch: amd64
    - name: Install Helm diff plugin
      helm_diff_plugin:
        version: "3.15.8"
        os: linux
        arch: amd64
